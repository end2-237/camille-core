version: '3.8'

services:
  camille-core:
    build: .
    # NE PAS mettre container_name ni ports — Coolify les gère
    init: true           # PID 1 propre (récolte les éventuels process orphelins)
    restart: unless-stopped
    cpus: 1.5            # le burst se termine vite ; régime stable ~0
    mem_limit: 1536m     # marge pour la sync ; régime stable ~120 Mo
    memswap_limit: 2g    # swap de sécurité anti-OOM pendant le burst
    volumes:
      - sessions-data:/app/sessions
      - media-data:/app/public/media
    environment:
      - PORT=3000
      - API_KEY=${API_KEY:-camille-core-secret}
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL:-}
      - N8N_WEBHOOK_DEFAULT=${N8N_WEBHOOK_DEFAULT:-}
      - SESSIONS_DIR=/app/sessions
      - CORE_PUBLIC_URL=${CORE_PUBLIC_URL:-}
      - MAX_SESSIONS=${MAX_SESSIONS:-2}

volumes:
  sessions-data:
  media-data:

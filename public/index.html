<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camille Core — Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      background: #111;
      border-bottom: 1px solid #222;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #25d366;
      letter-spacing: -0.5px;
    }

    header h1 span { color: #fff; }

    #add-form {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #add-form input {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e5e5e5;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      width: 180px;
      outline: none;
      transition: border-color .2s;
    }
    #add-form input:focus { border-color: #25d366; }
    #add-form input::placeholder { color: #555; }

    button {
      background: #25d366;
      color: #000;
      border: none;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    button:hover  { background: #1ebe57; }
    button:active { transform: scale(.97); }

    button.danger {
      background: #e53935;
      color: #fff;
      padding: 6px 12px;
      font-size: 12px;
    }
    button.danger:hover { background: #c62828; }

    main {
      padding: 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    #empty-state {
      text-align: center;
      padding: 80px 0;
      color: #555;
    }
    #empty-state p { font-size: 15px; margin-top: 8px; }

    #sessions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      transition: border-color .2s;
    }
    .card:hover { border-color: #333; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .badge-connected    { background: #1a3d2b; color: #25d366; }
    .badge-qr           { background: #2d2a00; color: #fdd835; }
    .badge-initializing { background: #1a2a3d; color: #42a5f5; }
    .badge-authenticated{ background: #1a3d2b; color: #66bb6a; }
    .badge-disconnected { background: #2a1a1a; color: #ef5350; }
    .badge-error        { background: #2a1a1a; color: #ef5350; }
    .badge-default      { background: #222; color: #888; }

    .qr-container {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-container img { width: 100%; max-width: 220px; display: block; }

    .qr-hint {
      font-size: 12px;
      color: #666;
      text-align: center;
      line-height: 1.5;
    }

    .connected-icon {
      font-size: 48px;
      text-align: center;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
    }

    .log {
      background: #0d0d0d;
      border: 1px solid #1a1a1a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 12px;
      color: #555;
      font-family: monospace;
      max-height: 80px;
      overflow-y: auto;
    }

    footer {
      text-align: center;
      padding: 24px;
      color: #333;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>Camille <span>Core</span></h1>
  <div id="add-form">
    <input type="text" id="session-name-input" placeholder="Nom de session (ex: default)" />
    <button onclick="startSession()">+ Démarrer</button>
  </div>
</header>

<main>
  <div id="empty-state" style="display:none">
    <div style="font-size:48px">📱</div>
    <p>Aucune session active.<br>Entrez un nom et cliquez sur <strong>+ Démarrer</strong>.</p>
  </div>
  <div id="sessions-grid"></div>
</main>

<footer>Camille Core v1.0 — whatsapp-web.js</footer>

<script>
  const API_KEY = prompt('Entrez votre API Key Camille Core :') || '';
  const grid    = document.getElementById('sessions-grid');
  const empty   = document.getElementById('empty-state');

  // ── Socket.io ────────────────────────────────────────────────────────────

  const socket = io();

  socket.on('init', (sessions) => {
    grid.innerHTML = '';
    sessions.forEach(renderCard);
    syncEmpty();
  });

  socket.on('session:update', ({ name, status, qr }) => {
    const existing = document.getElementById(`card-${name}`);
    if (existing) existing.remove();
    renderCard({ name, status, qr });
    syncEmpty();
  });

  socket.on('session:removed', ({ name }) => {
    const el = document.getElementById(`card-${name}`);
    if (el) el.remove();
    syncEmpty();
  });

  // ── Render ────────────────────────────────────────────────────────────────

  function badgeClass(status) {
    const map = {
      CONNECTED:     'badge-connected',
      QR_READY:      'badge-qr',
      INITIALIZING:  'badge-initializing',
      AUTHENTICATED: 'badge-authenticated',
      DISCONNECTED:  'badge-disconnected',
      ERROR:         'badge-error',
      AUTH_FAILURE:  'badge-error',
    };
    return map[status] || 'badge-default';
  }

  function renderCard({ name, status, qr }) {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${name}`;

    let body = '';

    if (status === 'QR_READY' && qr) {
      body = `
        <div class="qr-container">
          <img src="${qr}" alt="QR Code ${name}" />
        </div>
        <p class="qr-hint">Ouvrez WhatsApp → Appareils liés → Scanner ce QR</p>
      `;
    } else if (status === 'CONNECTED') {
      body = `<div class="connected-icon">✅</div>
              <p class="qr-hint" style="color:#25d366;text-align:center;font-weight:700">Connecté et prêt</p>`;
    } else if (status === 'INITIALIZING' || status === 'AUTHENTICATED') {
      body = `<p class="qr-hint" style="text-align:center">⏳ Initialisation en cours…<br>Le QR apparaîtra automatiquement.</p>`;
    } else {
      body = `<p class="qr-hint" style="text-align:center;color:#ef5350">
                ${status === 'DISCONNECTED' ? '🔌 Déconnecté — reconnexion auto dans 10s' : '❌ ' + status}
              </p>`;
    }

    card.innerHTML = `
      <div class="card-header">
        <span class="card-name">${name}</span>
        <span class="badge ${badgeClass(status)}">${status}</span>
      </div>
      ${body}
      <div class="card-footer">
        <button class="danger" onclick="stopSession('${name}')">Arrêter</button>
      </div>
    `;

    // Insérer en tête de grille
    grid.prepend(card);
  }

  function syncEmpty() {
    const hasCards = grid.children.length > 0;
    empty.style.display = hasCards ? 'none' : 'block';
  }

  // ── Actions ───────────────────────────────────────────────────────────────

  async function startSession() {
    const name = document.getElementById('session-name-input').value.trim();
    if (!name) return alert('Entrez un nom de session');
    document.getElementById('session-name-input').value = '';

    const res = await fetch('/api/sessions/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': API_KEY },
      body: JSON.stringify({ name }),
    });
    const data = await res.json();
    if (!data.success) alert('Erreur: ' + (data.error || 'inconnue'));
  }

  async function stopSession(name) {
    if (!confirm(`Arrêter la session "${name}" ?`)) return;
    await fetch(`/api/sessions/${name}/stop`, {
      method: 'DELETE',
      headers: { 'X-Api-Key': API_KEY },
    });
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  syncEmpty();
</script>
</body>
</html>
